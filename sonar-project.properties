# SonarCloud Configuration
sonar.projectKey=salahmostava-sys_muhimmat
sonar.organization=salahmostava-sys
sonar.projectName=Muhimmat AlTawseel
sonar.projectVersion=1.0.0
sonar.projectDescription=Delivery fleet management system
sonar.sourceEncoding=UTF-8

# ============================================
# Source Code
# ============================================
sonar.sources=frontend
sonar.tests=frontend

# ============================================
# Exclusions
# ============================================
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/build/**,\
  **/.next/**,\
  **/services/supabase/types.ts,\
  **/app/main.tsx,\
  **/*.config.js,\
  **/*.config.ts,\
  **/vite-env.d.ts

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/vitest.setup.ts,\
  **/shared/test/**,\
  **/e2e/**,\
  **/playwright-report/**

# ============================================
# Test Coverage
# ============================================
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# ============================================
# TypeScript
# ============================================
sonar.typescript.eslint.reportPaths=frontend/eslint-report.json

# ============================================
# Code Quality Rules
# ============================================
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# ============================================
# Performance
# ============================================
sonar.cpd.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# ============================================
# Security
# ============================================
sonar.security.hotspots.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.ts,\
  **/*.test.tsx

# ============================================
# Metrics
# ============================================
sonar.metrics.include=\
  complexity,\
  cognitive_complexity,\
  duplicated_lines_density,\
  lines_to_cover,\
  coverage,\
  ncloc,\
  comment_lines_density
