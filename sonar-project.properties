# SonarCloud — يُمرَّر مفتاح التنظيم ومفتاح المشروع من GitHub Actions (متغيرات المستودع)
# أنشئ مشروعاً على https://sonarcloud.io واربط المستودع، ثم أضف:
#   Secret: SONAR_TOKEN
#   Variables: SONAR_ORGANIZATION, SONAR_PROJECT_KEY

sonar.projectName=muhimmat-frontend
sonar.sourceEncoding=UTF-8

sonar.sources=frontend

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/services/supabase/types.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/vitest.setup.ts,**/shared/test/**,**/app/main.tsx

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json
