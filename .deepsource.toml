version = 1

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["browser"]
  dialect = "typescript"
  plugins = ["react"]

[[transformers]]
name = "prettier"
enabled = true

exclude_patterns = [
  "node_modules/**",
  "dist/**",
  "coverage/**",
  "frontend/services/supabase/types.ts",
  "**/*.test.*",
  "**/*.spec.*",
  "e2e/**",
]
