name: Frontend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Report root package files
        run: |
          for file in package.json package-lock.json bun.lock bun.lockb; do
            if [ -f "$file" ]; then
              echo "Legacy root-level $file detected. Frontend CI still installs strictly from frontend/."
            fi
          done

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint, test, and build (verify — strict)
        working-directory: frontend
        run: npm run lint:strict && npm run test && npm run build
